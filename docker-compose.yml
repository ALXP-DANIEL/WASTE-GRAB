services:
  database:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: wastegrab
      MYSQL_USER: wastegrab
      MYSQL_PASSWORD: wastegrab
      MYSQL_ROOT_PASSWORD: wastegrab-root
    ports:
      - "${DATABASE_PORT:-3307}:3306"
    volumes:
      - wastegrab-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        DATABASE_URL: ${DOCKER_DATABASE_URL:-mysql://wastegrab:wastegrab@database:3306/wastegrab}
    environment:
      PORT: ${PORT:-3000}
      CORS_ORIGIN: ${DOCKER_CORS_ORIGIN:-http://localhost:8080}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-mysql://wastegrab:wastegrab@database:3306/wastegrab}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_COOKIE_SECURE: "false"
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-build
      args:
        DATABASE_URL: ${DOCKER_DATABASE_URL:-mysql://wastegrab:wastegrab@database:3306/wastegrab}
    command: npx nx run backend:db:push
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-mysql://wastegrab:wastegrab@database:3306/wastegrab}
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        API_BASE_URL: ${DOCKER_API_BASE_URL:-http://localhost:3001/api}
        APP_BANNER_ENABLED: "true"
        APP_BANNER_LABEL: DOCKER
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  wastegrab-db:
