<!-- Page content -->
<section class="p-6">
    <app-header mode="welcome" />

  <div class="max-w-2xl">
    <h2 class="text-2xl font-bold text-slate-900 mb-6">Settings</h2>

    <div class="bg-white rounded-lg shadow space-y-6 p-6">
      <!-- Notifications Setting -->
      <div class="flex items-center justify-between pb-6 border-b">
        <div>
          <p class="font-medium text-slate-900">Push Notifications</p>
          <p class="text-sm text-slate-600 mt-1">Receive push notifications for important updates</p>
        </div>
        <button
          type="button"
          (click)="toggleNotifications()"
          [class.bg-emerald-600]="notifications"
          [class.bg-slate-300]="!notifications"
          class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
        >
          <span
            [class.translate-x-6]="notifications"
            [class.translate-x-1]="!notifications"
            class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
          ></span>
        </button>
      </div>

      <!-- Email Updates Setting -->
      <div class="flex items-center justify-between pb-6 border-b">
        <div>
          <p class="font-medium text-slate-900">Email Updates</p>
          <p class="text-sm text-slate-600 mt-1">Receive email updates about your waste impact</p>
        </div>
        <button
          type="button"
          (click)="toggleEmailUpdates()"
          [class.bg-emerald-600]="emailUpdates"
          [class.bg-slate-300]="!emailUpdates"
          class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
        >
          <span
            [class.translate-x-6]="emailUpdates"
            [class.translate-x-1]="!emailUpdates"
            class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
          ></span>
        </button>
      </div>

      <!-- Dark Mode Setting -->
      <div class="flex items-center justify-between pb-6">
        <div>
          <p class="font-medium text-slate-900">Dark Mode</p>
          <p class="text-sm text-slate-600 mt-1">Use dark theme for the application</p>
        </div>
        <button
          type="button"
          (click)="toggleDarkMode()"
          [class.bg-emerald-600]="darkMode"
          [class.bg-slate-300]="!darkMode"
          class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
        >
          <span
            [class.translate-x-6]="darkMode"
            [class.translate-x-1]="!darkMode"
            class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
          ></span>
        </button>
      </div>

      <!-- Save Button -->
      <div class="pt-6 flex gap-3">
        <button z-button class="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 text-white" (click)="saveSettings()">Save Settings</button>
        <button z-button zType="outline" class="px-6 py-2">Cancel</button>
      </div>
    </div>
  </div>
</section>
