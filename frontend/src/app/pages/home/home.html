<section class="flex w-full flex-col gap-6 px-4 pt-6 sm:px-6 lg:px-8">
  <div class="flex items-start justify-between gap-4">
    <div class="min-w-0 flex-1">
      @if (authService.currentUser(); as user) {
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">Welcome back, {{ user.name }}! 👋</h1>
        <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-500 sm:text-base">{{ randomQuote }}</p>
      } @else if (!authService.hasLoadedSession()) {
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">Welcome back! 👋</h1>
        <p class="mt-2 text-sm leading-6 text-slate-500 sm:text-base">{{ randomQuote }}</p>
      } @else {
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">Welcome! 👋</h1>
        <p class="mt-2 text-sm leading-6 text-slate-500 sm:text-base">{{ randomQuote }}</p>
      }
    </div>

    @if (authService.currentUser(); as user) {
      <z-avatar
        [zFallback]="user.name.slice(0, 2).toUpperCase()"
        [zAlt]="user.name + ' avatar'"
        zSize="lg"
        class="mt-1 ring-2 ring-white shadow-sm"
      />
    }
  </div>
