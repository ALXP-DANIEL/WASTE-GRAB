name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  deployments: write
  id-token: write
  packages: write
  pages: write

env:
  NODE_VERSION: 24
  RAILWAY_BACKEND_URL: https://api.wastegrab.alifdaniel.dpdns.org
  RAILWAY_FRONTEND_URL: https://wastegrab.alifdaniel.dpdns.org

jobs:
  shared-types-check:
    name: Shared types checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm exec -- nx run-many -t lint test typecheck build -p shared-types --outputStyle=static
      - run: npm exec -- nx fix-ci
        if: always()

  backend-check:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: shared-types-check
    env:
      DATABASE_URL: mysql://wastegrab:wastegrab@localhost:3306/wastegrab
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm exec -- nx run-many -t lint test build typecheck -p backend --outputStyle=static
      - run: npm exec -- nx fix-ci
        if: always()

  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: shared-types-check
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm exec -- nx run-many -t lint test build typecheck -p frontend --outputStyle=static
      - run: npm exec -- nx fix-ci
        if: always()

  e2e-check:
    name: E2E checks
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check
    env:
      DATABASE_URL: mysql://wastegrab:wastegrab@localhost:3306/wastegrab
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm exec -- playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: npm exec -- nx run e2e:e2e --outputStyle=static -- --reporter=html
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Upload Playwright report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/e2e/playwright-report
      - name: Deploy Playwright report to GitHub Pages
        id: playwright-report-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
      - name: Add Playwright report link
        if: always()
        shell: bash
        run: |
          {
            echo "### Playwright E2E report"
            echo ""
            if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "Preview: ${{ steps.playwright-report-pages.outputs.page_url }}"
              echo ""
            fi
            echo "Artifact fallback: download the \`playwright-report\` artifact from this workflow run, then open \`index.html\`."
          } >> "$GITHUB_STEP_SUMMARY"
      - run: npm exec -- nx fix-ci
        if: always()

  backend-image:
    name: Backend Docker image
    runs-on: ubuntu-latest
    needs: backend-check
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            DATABASE_URL=mysql://wastegrab:wastegrab@database:3306/wastegrab

      - name: Redeploy backend on Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
        shell: bash
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE" ]; then
            echo "Railway backend redeploy skipped. Set RAILWAY_TOKEN and RAILWAY_BACKEND_SERVICE to enable it."
            exit 0
          fi

          npm exec --yes --package=@railway/cli -- railway redeploy --service "$RAILWAY_SERVICE" --yes

      - name: Record backend deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          image_tag="$(printf '%s\n' "$IMAGE_TAGS" | head -n 1)"
          deployment_id="$(
            jq -n \
              --arg ref "$GITHUB_SHA" \
              --arg environment "backend / production" \
              --arg description "Backend image published to GHCR and Railway redeploy requested" \
              '{
                ref: $ref,
                environment: $environment,
                description: $description,
                auto_merge: false,
                required_contexts: [],
                production_environment: true
              }' |
              gh api "repos/$GITHUB_REPOSITORY/deployments" --method POST --input - --jq '.id'
          )"

          jq -n \
            --arg state "success" \
            --arg environment_url "$RAILWAY_BACKEND_URL" \
            --arg log_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg description "Published $image_tag" \
            '{
              state: $state,
              environment_url: $environment_url,
              log_url: $log_url,
              description: $description
            }' |
            gh api "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" --method POST --input -

  frontend-image:
    name: Frontend Docker image
    runs-on: ubuntu-latest
    needs: frontend-check
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Validate production API URL
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FRONTEND_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
        shell: bash
        run: |
          if [ -z "$FRONTEND_API_BASE_URL" ]; then
            echo "Set the FRONTEND_API_BASE_URL repository variable before publishing frontend images."
            exit 1
          fi

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL || '/api' }}

      - name: Redeploy frontend on Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
        shell: bash
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE" ]; then
            echo "Railway frontend redeploy skipped. Set RAILWAY_TOKEN and RAILWAY_FRONTEND_SERVICE to enable it."
            exit 0
          fi

          npm exec --yes --package=@railway/cli -- railway redeploy --service "$RAILWAY_SERVICE" --yes

      - name: Record frontend deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          image_tag="$(printf '%s\n' "$IMAGE_TAGS" | head -n 1)"
          deployment_id="$(
            jq -n \
              --arg ref "$GITHUB_SHA" \
              --arg environment "frontend / production" \
              --arg description "Frontend image published to GHCR and Railway redeploy requested" \
              '{
                ref: $ref,
                environment: $environment,
                description: $description,
                auto_merge: false,
                required_contexts: [],
                production_environment: true
              }' |
              gh api "repos/$GITHUB_REPOSITORY/deployments" --method POST --input - --jq '.id'
          )"

          jq -n \
            --arg state "success" \
            --arg environment_url "$RAILWAY_FRONTEND_URL" \
            --arg log_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg description "Published $image_tag" \
            '{
              state: $state,
              environment_url: $environment_url,
              log_url: $log_url,
              description: $description
            }' |
            gh api "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" --method POST --input -

  notify-whatsapp-unofficial:
    name: Notify WhatsApp Group
    runs-on: ubuntu-latest

    needs:
      - shared-types-check
      - backend-check
      - frontend-check
      - e2e-check
      - backend-image
      - frontend-image

    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}

    continue-on-error: true

    env:
      WA_NOTIFY_WEBHOOK_URL: ${{ vars.WA_NOTIFY_WEBHOOK_URL }}
      WA_NOTIFY_TOKEN: ${{ secrets.WA_NOTIFY_TOKEN }}

      EVENT_NAME: ${{ github.event_name }}
      REF_NAME: ${{ github.ref_name }}
      HEAD_REF: ${{ github.head_ref }}
      SHA: ${{ github.sha }}
      REPOSITORY: ${{ github.repository }}
      SERVER_URL: ${{ github.server_url }}
      RUN_ID: ${{ github.run_id }}
      RUN_NUMBER: ${{ github.run_number }}
      ACTOR: ${{ github.actor }}

      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}

      SHARED_RESULT: ${{ needs.shared-types-check.result }}
      BACKEND_CHECK_RESULT: ${{ needs.backend-check.result }}
      FRONTEND_CHECK_RESULT: ${{ needs.frontend-check.result }}
      E2E_CHECK_RESULT: ${{ needs.e2e-check.result }}
      BACKEND_IMAGE_RESULT: ${{ needs.backend-image.result }}
      FRONTEND_IMAGE_RESULT: ${{ needs.frontend-image.result }}

    steps:
      - name: Send WhatsApp group notification
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error

          webhook_url = os.getenv("WA_NOTIFY_WEBHOOK_URL", "").strip()
          token = os.getenv("WA_NOTIFY_TOKEN", "").strip()

          if not webhook_url or not token:
              print("WA_NOTIFY_WEBHOOK_URL or WA_NOTIFY_TOKEN missing. Skipping WhatsApp notification.")
              sys.exit(0)

          event_name = os.getenv("EVENT_NAME", "")
          ref_name = os.getenv("REF_NAME", "")
          head_ref = os.getenv("HEAD_REF", "")
          branch = head_ref or ref_name or "unknown"

          sha = os.getenv("SHA", "")
          short_sha = sha[:7] if sha else "unknown"

          repository = os.getenv("REPOSITORY", "")
          server_url = os.getenv("SERVER_URL", "https://github.com")
          run_id = os.getenv("RUN_ID", "")
          run_number = os.getenv("RUN_NUMBER", "")
          actor = os.getenv("ACTOR", "unknown")
          run_url = f"{server_url}/{repository}/actions/runs/{run_id}"

          results = {
              "Shared types": os.getenv("SHARED_RESULT", "unknown"),
              "Backend checks": os.getenv("BACKEND_CHECK_RESULT", "unknown"),
              "Frontend checks": os.getenv("FRONTEND_CHECK_RESULT", "unknown"),
              "E2E checks": os.getenv("E2E_CHECK_RESULT", "unknown"),
              "Backend image/deploy": os.getenv("BACKEND_IMAGE_RESULT", "unknown"),
              "Frontend image/deploy": os.getenv("FRONTEND_IMAGE_RESULT", "unknown"),
          }

          failed_jobs = [
              name
              for name, result in results.items()
              if result != "success"
          ]

          is_success = len(failed_jobs) == 0

          def status_word():
              if event_name == "push" and ref_name == "main":
                  return "DEPLOYED" if is_success else "DEPLOY FAILED"
              return "PASSED" if is_success else "FAILED"

          def event_title():
              if event_name == "pull_request":
                  return "Pull Request CI"
              if event_name == "push" and ref_name == "main":
                  return "Production Deploy"
              return "Workflow Run"

          def result_lines():
              return "\n".join(
                  f"- {name}: {result}"
                  for name, result in results.items()
              )

          status = status_word()
          title = event_title()

          if event_name == "pull_request":
              pr_number = os.getenv("PR_NUMBER", "")
              pr_title = os.getenv("PR_TITLE", "")
              pr_url = os.getenv("PR_URL", "")

              text = (
                  f"WasteGrab {title}\n"
                  f"Status: {status}\n\n"
                  f"PR: #{pr_number} {pr_title}\n"
                  f"Branch: {branch}\n"
                  f"Commit: {short_sha}\n"
                  f"Actor: {actor}\n\n"
                  f"Checks:\n{result_lines()}\n\n"
                  f"Run: {run_url}\n"
                  f"PR URL: {pr_url}"
              )

          elif event_name == "push" and ref_name == "main":
              text = (
                  f"WasteGrab {title}\n"
                  f"Status: {status}\n\n"
                  f"Branch: {branch}\n"
                  f"Commit: {short_sha}\n"
                  f"Actor: {actor}\n\n"
                  f"Pipeline:\n{result_lines()}\n\n"
                  f"Production:\n"
                  f"- Backend: https://api.wastegrab.alifdaniel.dpdns.org\n"
                  f"- Frontend: https://wastegrab.alifdaniel.dpdns.org\n\n"
                  f"Run: {run_url}"
              )

          else:
              text = (
                  f"WasteGrab {title}\n"
                  f"Status: {status}\n\n"
                  f"Event: {event_name}\n"
                  f"Branch: {branch}\n"
                  f"Commit: {short_sha}\n"
                  f"Actor: {actor}\n\n"
                  f"Jobs:\n{result_lines()}\n\n"
                  f"Run: {run_url}"
              )

          if failed_jobs:
              text += "\n\nFailed:\n" + "\n".join(f"- {job}" for job in failed_jobs)

          payload = {
              "text": text[:4096]
          }

          request = urllib.request.Request(
              url=webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  print(response.read().decode("utf-8"))
                  print("WhatsApp group notification sent.")
          except urllib.error.HTTPError as error:
              print("WhatsApp group notification failed.")
              print(error.read().decode("utf-8"))
              sys.exit(1)
          except Exception as error:
              print("WhatsApp group notification failed.")
              print(str(error))
              sys.exit(1)
          PY
