name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  packages: write

env:
  NODE_VERSION: 26

jobs:
  shared-types-check:
    name: Shared types checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm exec -- nx run-many -t lint test typecheck -p shared-types --outputStyle=static
      - run: npm exec -- nx fix-ci
        if: always()

  backend-check:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: shared-types-check
    env:
      DATABASE_URL: mysql://wastegrab:wastegrab@localhost:3306/wastegrab
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm exec -- nx run-many -t lint test build typecheck -p backend --outputStyle=static
      - run: npm exec -- nx fix-ci
        if: always()

  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: shared-types-check
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm exec -- nx run-many -t lint test build typecheck -p frontend --outputStyle=static
      - run: npm exec -- nx fix-ci
        if: always()

  backend-image:
    name: Backend Docker image
    runs-on: ubuntu-latest
    needs: backend-check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Validate production API URL
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FRONTEND_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
        shell: bash
        run: |
          if [ -z "$FRONTEND_API_BASE_URL" ]; then
            echo "Set the FRONTEND_API_BASE_URL repository variable before publishing frontend images."
            exit 1
          fi

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            DATABASE_URL=mysql://wastegrab:wastegrab@database:3306/wastegrab

      - name: Redeploy backend on Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
        shell: bash
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE" ]; then
            echo "Railway backend redeploy skipped. Set RAILWAY_TOKEN and RAILWAY_BACKEND_SERVICE to enable it."
            exit 0
          fi

          npm exec --yes --package=@railway/cli -- railway redeploy --service "$RAILWAY_SERVICE" --yes

  frontend-image:
    name: Frontend Docker image
    runs-on: ubuntu-latest
    needs: frontend-check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL || '/api' }}

      - name: Redeploy frontend on Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
        shell: bash
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE" ]; then
            echo "Railway frontend redeploy skipped. Set RAILWAY_TOKEN and RAILWAY_FRONTEND_SERVICE to enable it."
            exit 0
          fi

          npm exec --yes --package=@railway/cli -- railway redeploy --service "$RAILWAY_SERVICE" --yes
