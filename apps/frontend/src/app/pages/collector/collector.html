<section class="grid gap-5 p-4 md:p-6 lg:p-8">
  <app-header mode="route">
    <a
      [routerLink]="pickupsPath"
      class="inline-flex h-11 items-center justify-center gap-2 rounded-full btn-brand px-5 text-sm font-semibold shadow-sm transition-colors"
      rightSide
    >
      <ng-icon name="lucideNavigation" class="size-4!" />
      Find Pickups
    </a>
  </app-header>

  @if (isLoading()) {
  <div class="flex items-center justify-center py-16">
    <ng-icon name="lucideLoaderCircle" class="size-6! animate-spin text-muted-foreground" />
  </div>
  } @else if (loadError()) {
  <app-empty-state
    icon="lucideWifi"
    [title]="loadError()"
    description="Pull down to retry or check your connection."
  />
  } @else {
  <div class="grid gap-5">
    <section class="grid gap-4 lg:grid-cols-[minmax(0,1.6fr)_minmax(18rem,0.9fr)]">
      <app-collector-hero
        [stats]="stats()"
        [myPickupsRoute]="myPickupsPath"
        [earningsRoute]="earningsPath"
      />

      <app-collector-locations-panel
        [locations]="locationCards()"
        [description]="collectionLocations().length + ' drop-off locations'"
      />
    </section>

    <app-collector-next-pickup [pickup]="featuredPickup()" />

    <section class="grid gap-4 xl:grid-cols-[minmax(0,1.1fr)_minmax(0,1fr)]">
      <app-collector-pickup-list
        title="Active Assignments"
        description="Pickups you have accepted and still need to close."
        [items]="activeAssignments()"
        actionLabel="View all"
        [actionRoute]="myPickupsPath"
        emptyText="Accepted pickups will appear here."
      />

      <app-collector-pickup-list
        title="Nearby Requests"
        description="Open customer requests ready for a collector."
        [items]="nearbyRequests()"
        actionLabel="Find more"
        [actionRoute]="pickupsPath"
        emptyText="No available pickups are waiting right now."
      />
    </section>
  </div>
  }
</section>
