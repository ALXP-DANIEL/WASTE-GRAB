<section class="grid gap-5 p-4 md:p-8">
  <app-header mode="route" />

  <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
    @for (shortcut of shortcuts; track shortcut.route) {
      <a
        [routerLink]="shortcut.route"
        class="group flex min-h-36 flex-col justify-between rounded-xl border border-border bg-card p-5 shadow-sm transition-colors hover:border-primary/40 hover:bg-muted/30"
      >
        <span class="grid size-10 place-items-center rounded-lg bg-primary/10 text-primary">
          <ng-icon [name]="shortcut.icon" class="size-5!" />
        </span>
        <span>
          <span class="block text-sm font-semibold text-foreground">{{ shortcut.label }}</span>
          <span class="mt-2 block text-sm leading-6 text-muted-foreground">{{ shortcut.description }}</span>
        </span>
      </a>
    }
  </section>
</section>
