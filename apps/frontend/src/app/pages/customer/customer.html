<section class="grid gap-5 p-4 md:p-6 lg:p-8">
  <app-header />

  <div class="grid w-full gap-5">
    <app-customer-hero [customerName]="customerName()" />

    <app-stat-grid [stats]="dashboardStats()" />

    @if (isLoadingRequests()) {
    <div class="flex items-center justify-center py-16">
      <ng-icon name="lucideLoaderCircle" class="size-6! animate-spin text-muted-foreground" />
    </div>
    } @else if (loadErrorRequests()) {
    <app-empty-state
      icon="lucideWifi"
      [title]="loadErrorRequests()"
      description="Pull down to retry or check your connection."
    />
    } @else {
    <section class="lg:grid lg:grid-cols-3 lg:gap-6">
      <div class="grid gap-5 lg:col-span-2">
        <app-customer-active-pickup-card
          [pickup]="activePickupSummary()"
          [newPickupRoute]="newPickupPath"
        />

        <app-customer-quick-actions [actions]="quickActions()" />
      </div>

      <aside
        class="mt-5 grid max-h-none content-start gap-5 overflow-visible lg:mt-0 lg:max-h-[calc(70dvh-8rem)] lg:overflow-y-auto lg:pr-1"
      >
        <app-customer-voucher-panel
          [vouchers]="activeVoucherSummaries()"
          [vouchersRoute]="vouchersPath"
        />
        <app-customer-rank-panel
          [rows]="leaderboardRows()"
          [leaderboardRoute]="leaderboardPath"
        />
      </aside>
    </section>

    <app-customer-recent-requests
      [requests]="recentPickupSummaries()"
      [pickupsRoute]="pickupsPath"
    />
    }
  </div>
</section>
