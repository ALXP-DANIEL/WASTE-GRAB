<section class="p-6 md:p-8 gap-3 grid">
  <app-header mode="route" />

  <div class="max-w-3xl mx-auto bg-white p-4 rounded shadow">
    <h2 class="text-lg font-semibold mb-3">Request New Pickup</h2>

    <div class="mb-4">
      <div class="block mb-2 font-medium">Upload Waste Images</div>
      <input #fileInput type="file" (change)="onFilesSelected($event)" multiple accept="image/*" class="hidden" />
      <div class="flex gap-2">
        <button type="button" class="btn btn-secondary" (click)="fileInput.click()">Upload Images</button>
        <button type="button" class="btn btn-primary" (click)="analyzeImagesMock()" [disabled]="isAnalyzing() || !images().length">{{ isAnalyzing() ? 'Analyzing...' : 'Analyze Images' }}</button>
        <button type="button" class="btn" (click)="clearImages()" [disabled]="!images().length">Clear</button>
      </div>
      <div class="mt-3 flex gap-2 flex-wrap">
        @for (src of previews(); let i = $index; track src) {
          <img [src]="src" [alt]="'Waste preview ' + (i + 1)" class="w-24 h-24 object-cover rounded border" />
        }
      </div>
    </div>

    @if (aiSuggestions().length) {
    <div class="mb-4">
      <div class="block mb-2 font-medium">AI Suggestions</div>
      <ul class="space-y-2">
        @for (s of aiSuggestions(); track s.category) {
        <li class="flex items-center justify-between p-2 border rounded">
          <div>
            <div class="font-semibold">{{ s.category }}</div>
            <div class="text-sm text-slate-500">Estimated quantity: {{ s.estimatedQuantity }}</div>
          </div>
          <div>
            <button class="btn btn-secondary" (click)="applySuggestion(s)">Autofill</button>
          </div>
        </li>
        }
      </ul>
    </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-3">
      <div>
        <label for="wasteCategory" class="block mb-1 font-medium">Waste Category</label>
        <input id="wasteCategory" class="w-full border rounded p-2" formControlName="wasteCategory" placeholder="e.g. Plastic Bottles" />
      </div>

      <div>
        <label for="description" class="block mb-1 font-medium">Description / Notes</label>
        <textarea id="description" class="w-full border rounded p-2" formControlName="description" rows="3" placeholder="Optional details"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="estimatedQuantity" class="block mb-1 font-medium">Estimated Quantity</label>
          <input id="estimatedQuantity" type="number" min="1" class="w-full border rounded p-2" formControlName="estimatedQuantity" />
        </div>

        <div>
          <label for="location" class="block mb-1 font-medium">Pickup Location</label>
          <select id="location" class="w-full border rounded p-2" formControlName="location">
            @for (a of addresses; track a.id) {
              <option [value]="a.id">{{ a.label }}</option>
            }
          </select>
        </div>
      </div>

      <div class="mt-3 flex justify-end gap-2">
        <button type="submit" class="btn btn-primary">Request Pickup</button>
      </div>
    </form>
  </div>
</section>
