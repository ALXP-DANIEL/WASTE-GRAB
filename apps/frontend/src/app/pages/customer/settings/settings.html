<section class="grid gap-5 p-4 md:p-6 lg:p-8">
  <app-header mode="route" />

  <div class="rounded-2xl border border-border bg-card p-6 shadow-sm space-y-6">
    <!-- Notifications Setting -->
    <div class="flex items-center justify-between pb-6 border-b border-border">
      <div>
        <p class="font-medium text-foreground">Push Notifications</p>
        <p class="text-sm text-muted-foreground mt-1">
          Receive push notifications for important updates
        </p>
      </div>
      <button
        type="button"
        (click)="toggleNotifications()"
        [class.bg-primary]="notifications"
        [class.bg-input]="!notifications"
        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring"
      >
        <span
          [class.translate-x-6]="notifications"
          [class.translate-x-1]="!notifications"
          class="inline-block size-4  transform rounded-full bg-background shadow-sm transition-transform"
        ></span>
      </button>
    </div>

    <!-- Email Updates Setting -->
    <div class="flex items-center justify-between pb-6 border-b border-border">
      <div>
        <p class="font-medium text-foreground">Email Updates</p>
        <p class="text-sm text-muted-foreground mt-1">
          Receive email updates about your waste impact
        </p>
      </div>
      <button
        type="button"
        (click)="toggleEmailUpdates()"
        [class.bg-primary]="emailUpdates"
        [class.bg-input]="!emailUpdates"
        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring"
      >
        <span
          [class.translate-x-6]="emailUpdates"
          [class.translate-x-1]="!emailUpdates"
          class="inline-block size-4  transform rounded-full bg-background shadow-sm transition-transform"
        ></span>
      </button>
    </div>

    <!-- Dark Mode Setting -->
    <div class="flex items-center justify-between pb-6">
      <div>
        <p class="font-medium text-foreground">Dark Mode</p>
        <p class="text-sm text-muted-foreground mt-1">
          Use dark theme for the application
        </p>
      </div>
      <button
        type="button"
        (click)="toggleDarkMode()"
        [class.bg-primary]="darkMode"
        [class.bg-input]="!darkMode"
        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring"
      >
        <span
          [class.translate-x-6]="darkMode"
          [class.translate-x-1]="!darkMode"
          class="inline-block size-4  transform rounded-full bg-background shadow-sm transition-transform"
        ></span>
      </button>
    </div>
  </div>
</section>
